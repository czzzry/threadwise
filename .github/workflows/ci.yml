name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run test suite
        run: python3 -m unittest discover -s tests

      - name: Check public-data hygiene
        run: python3 scripts/check_public_data_hygiene.py
